<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Confidential</title>
<style>
  :root{--navy:#0A1628;--surface:#0F2040;--offwhite:#F0EDE6;--slate:#8A97A8;--copper:#B87333;--rule:rgba(255,255,255,0.08);--serif:Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--mono:"SF Mono",Consolas,monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--navy);color:var(--offwhite);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:56px 28px 80px}
  /* gate */
  #gate{max-width:420px;margin:14vh auto 0;text-align:center;padding:0 24px}
  .lock{font-family:var(--mono);color:var(--copper);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
  #gate h1{font-family:var(--serif);font-weight:400;font-size:30px;margin-bottom:10px}
  #gate p{color:var(--slate);font-size:14px;margin-bottom:26px}
  #pw{width:100%;background:var(--surface);border:1px solid var(--rule);color:var(--offwhite);font-family:var(--mono);font-size:14px;padding:13px 14px;border-radius:3px;outline:none}
  #pw:focus{border-color:var(--copper)}
  #go{margin-top:14px;width:100%;background:var(--copper);color:var(--navy);border:none;font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;font-size:12px;font-weight:700;padding:14px;border-radius:3px;cursor:pointer}
  #go:hover{background:#8A5525}
  #err{color:#d98a6a;font-family:var(--mono);font-size:12px;margin-top:14px;min-height:16px}
  /* content */
  #rc{display:none}
  .rc-eyebrow{font-family:var(--mono);color:var(--copper);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
  .rc-title{font-family:var(--serif);font-weight:400;font-size:clamp(28px,5vw,40px);line-height:1.1;margin-bottom:16px}
  .rc-lead{color:var(--slate);font-size:16px;line-height:1.7;margin-bottom:34px}
  .rc-value{background:var(--surface);border-left:3px solid var(--copper);padding:22px 24px;border-radius:0 3px 3px 0;margin-bottom:38px}
  .rc-h{font-family:var(--mono);color:var(--copper);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  .rc-value p:last-child{color:var(--offwhite);font-size:14.5px;line-height:1.75}
  .rc-section{font-family:var(--serif);font-weight:400;font-size:22px;margin:34px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--rule)}
  table.rc-table{width:100%;border-collapse:collapse;margin-bottom:14px}
  table.rc-table th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--slate);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--rule)}
  table.rc-table td{font-size:14px;color:var(--offwhite);padding:11px 10px;border-bottom:1px solid var(--rule);vertical-align:top}
  td.rc-rate{font-family:var(--mono);color:var(--copper);white-space:nowrap}
  .rc-note{color:var(--slate);font-size:13.5px;line-height:1.7;margin-bottom:20px}
  ul.rc-src{list-style:none;margin-bottom:26px}
  ul.rc-src li{font-family:var(--mono);font-size:12px;color:var(--slate);line-height:1.5;padding:6px 0 6px 18px;position:relative}
  ul.rc-src li::before{content:"\2014";position:absolute;left:0;color:var(--copper)}
  .rc-foot{font-family:var(--mono);font-size:11.5px;color:var(--slate);opacity:.7;border-top:1px solid var(--rule);padding-top:18px;margin-top:8px}
  @media(max-width:560px){td.rc-rate{white-space:normal}}
</style>
</head>
<body>
  <div id="gate">
    <div class="lock">Confidential</div>
    <h1>Engagement &amp; Rates</h1>
    <p>Enter the access passphrase to view current engagement rates.</p>
    <input id="pw" type="password" placeholder="Passphrase" autocomplete="off" autofocus />
    <button id="go">Unlock</button>
    <div id="err"></div>
  </div>
  <div class="wrap"><div id="rc"></div></div>

  function b64(s){ var bin = atob(s), u = new Uint8Array(bin.length); for (var i=0;i<bin.length;i++){ u[i]=bin.charCodeAt(i);} return u; }
  async function unlock(pw){
    var km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey({ name:"PBKDF2", salt:b64(PAYLOAD.salt), iterations:PAYLOAD.iter, hash:"SHA-256" }, km, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
    var buf = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64(PAYLOAD.iv) }, key, b64(PAYLOAD.data));
    return new TextDecoder().decode(buf);
  }
  function attempt(){
    var pw = document.getElementById("pw").value;
    var err = document.getElementById("err");
    if(!pw){ return; }
    err.textContent = "Decrypting...";
    unlock(pw).then(function(html){
      document.getElementById("rc").innerHTML = html;
      document.getElementById("gate").style.display = "none";
      document.getElementById("rc").style.display = "block";
      document.title = "Engagement & Rates";
      window.scrollTo(0,0);
    }).catch(function(){
      err.textContent = "Incorrect passphrase.";
      document.getElementById("pw").value = "";
      document.getElementById("pw").focus();
    });
  }
  document.getElementById("go").addEventListener("click", attempt);
  document.getElementById("pw").addEventListener("keydown", function(e){ if(e.key === "Enter"){ attempt(); } });
</script>
</body>
</html>
